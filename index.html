<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR с маркером — моя модель</title>
    <!-- Подключаем A-Frame и AR.js -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
        .info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- AR-сцена с отслеживанием маркера -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Маркер "hiro" — распечатайте эту картинку -->
        <a-marker preset="hiro">
            <!-- ⚠️ ВАЖНО: ЗДЕСЬ ВАША МОДЕЛЬ -->
            <!-- Нужно заменить URL на ссылку на ваш .gltf файл -->
            <a-entity 
                position="0 0 0"
                scale="0.1 0.1 0.1"
                gltf-model="./DiffuseTransmissionTeacup.glb"
            </a-entity>
        </a-marker>
        
        <!-- Камера -->
        <a-entity camera></a-entity>
        
    </a-scene>
    
    <div class="info">
        🎯 Наведите камеру на маркер "hiro" (распечатайте картинку или откройте на другом экране)
    </div>
</body>
</html>
