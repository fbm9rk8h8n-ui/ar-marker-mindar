<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR — модель со звуком</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px;
            font-size: 14px;
            z-index: 100;
            font-family: sans-serif;
        }
        .sound-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 20px;
            color: #4cd964;
            font-size: 12px;
            z-index: 100;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <a-scene 
        embedded 
        arjs="sourceType: webcam; 
              debugUIEnabled: false; 
              detectionMode: mono_and_matrix;
              matrixCodeType: 3x3;">
        
        <a-marker 
            preset="hiro"
            smooth="true"
            smoothCount="15"
            smoothTolerance="0.01"
            smoothThreshold="5">
            
            <!-- 3D модель -->
            <a-entity 
                position="0 0 0"
                scale="0.5 0.5 0.5"
                gltf-model="./BoxInterleaved.glb">
            </a-entity>
            
            <!-- 🔊 ЗВУК — ВОТ ЭТА ОДНА СТРОКА -->
            <a-sound src="./sound.mp3" autoplay="true" loop="true" volume="0.7"></a-sound>
            
        </a-marker>
        
        <a-entity camera></a-entity>
        
    </a-scene>
    
    <div class="info">
        🎯 Наведите камеру на маркер "hiro"
    </div>
    <div class="sound-hint">
        🔊 Звук включён (цикл)
    </div>
</body>
</html>
