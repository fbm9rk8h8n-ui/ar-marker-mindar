<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR — Стабильная модель</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px;
            font-size: 14px;
            z-index: 100;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <!-- 
      В ЭТУ СТРОКУ добавлены новые параметры:
      - detectionMode: mono_and_matrix (улучшает распознавание)
      - matrixCodeType: 3x3 (помогает с 3x3 маркерами)
    -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; 
              debugUIEnabled: false; 
              detectionMode: mono_and_matrix;
              matrixCodeType: 3x3;">
        
        <!-- 
          А В ЭТОТ ТЕГ добавлены параметры сглаживания!
          - smooth: true (включает сглаживание)
          - smoothCount: 15 (увеличивает плавность, усредняя 15 последних положений)
          - smoothTolerance: 0.01 (оставляет значение по умолчанию)
          - smoothThreshold: 5 (количество измерений для запуска сглаживания)
        -->
        <a-marker 
            preset="hiro"
            smooth="true"
            smoothCount="15"
            smoothTolerance="0.01"
            smoothThreshold="5">
            
            <!-- Ваша модель BoxInterleaved -->
            <a-entity 
                position="0 0 0"
                scale="0.5 0.5 0.5"
                gltf-model="./BoxInterleaved.glb">
            </a-entity>
        </a-marker>
        
        <a-entity camera></a-entity>
        
    </a-scene>
    
    <div class="info">
        🎯 Наведите камеру на маркер "hiro"
    </div>
</body>
</html>
